<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Music Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player-container">
<div class="player-card">

<span class="artist-badge" id="artistBadge">BTS</span>

<div class="cover-wrap">
<img id="cover" src="https://via.placeholder.com/300/1a1a2e/a78bfa?text=%E2%99%AB" alt="album cover">
<div class="vinyl" id="vinyl"></div>
</div>

<h2 id="songTitle">Song Title</h2>
<p id="songArtist">Artist Name</p>
<p id="songAlbum">Album Name</p>

<div class="progress-container" id="progressContainer">
<div class="progress" id="progress"></div>
<div class="progress-thumb" id="progressThumb"></div>
</div>

<div class="time-row">
<span id="currentTime">0:00</span>
<span id="duration">0:00</span>
</div>

<div class="controls">
<button id="shuffleBtn" class="icon-btn" title="Shuffle">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polyline points="16 3 21 3 21 8"/>
<line x1="4" y1="20" x2="21" y2="3"/>
<polyline points="21 16 21 21 16 21"/>
<line x1="15" y1="15" x2="21" y2="21"/>
<line x1="4" y1="4" x2="9" y2="9"/>
</svg>
</button>

<button id="prevBtn" class="icon-btn" title="Previous">
<svg viewBox="0 0 24 24" fill="currentColor">
<path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
</svg>
</button>

<button id="playBtn" class="play-btn" title="Play/Pause">
<svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
<path d="M8 5v14l11-7z"/>
</svg>
<svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
</svg>
</button>

<button id="nextBtn" class="icon-btn" title="Next">
<svg viewBox="0 0 24 24" fill="currentColor">
<path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
</svg>
</button>

<button id="repeatBtn" class="icon-btn" title="Repeat">
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
<polyline points="17 1 21 5 17 9"/>
<path d="M3 11V9a4 4 0 0 1 4-4h14"/>
<polyline points="7 23 3 19 7 15"/>
<path d="M21 13v2a4 4 0 0 1-4 4H3"/>
</svg>
</button>
</div>

<div class="volume-row">
<svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
</svg>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
<span class="vol-pct" id="volPct">50%</span>
</div>

<div class="autoplay-row">
<span>Autoplay</span>
<label class="switch">
<input type="checkbox" id="autoplayCheck" checked>
<span class="slider-pill"></span>
</label>
</div>

</div>

<div class="playlist-card">

<div class="tabs">
<button class="tab active" data-filter="all">All</button>
<button class="tab" data-filter="BTS">BTS</button>
<button class="tab" data-filter="Lana Del Rey">Lana Del Rey</button>
<button class="tab" data-filter="Billie Eilish">Billie Eilish</button>
</div>

<h3 id="playlistLabel">All Songs</h3>

<ul id="playlist">

</ul>

</div>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
